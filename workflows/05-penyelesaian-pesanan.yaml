version: "3.0"
metadata:
  id: umkm-penyelesaian-pesanan
  name: "UMKM - Penyelesaian Pesanan"
  description: |
    Workflow 5. Menutup transaksi secara resmi dan memperbarui stok produk
    di database. Durability dinyalakan secara eksplisit karena dua
    write (update stok + update status) harus konsisten -> DB sebagai SSOT.
  dialect: vflow
  tags: [umkm, penyelesaian, postgres, durable, p0]

spec:
  durability:
    enabled: true
    default_mode: immediate

  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        runtime_mode: standard
        webhook_config: { path: /umkm/pesanan/selesaikan, method: POST }
        response_framing: length_prefixed
        end_activity: respond
      durability: immediate
      output_variable: trigger_payload

    # Ambil detail item pesanan untuk pengurangan stok per produk.
    - id: select_detail_pesanan
      activity_type: Connector
      persistence: ssot
      connector_config:
        connector_ref: postgres
        operation: raw_query
        timeout_ms: 3000
      input_mappings:
        - target: sql
          source:
            language: literal
            source: "SELECT produk_id, jumlah FROM detail_pesanan WHERE pesanan_id = $1"
        - target: params
          source:
            language: v-cel
            source: '[trigger_payload.body.pesanan_id]'
      output_variable: detail_result

    - id: loop_update_stok
      activity_type: LoopForEach
      loop_config:
        collection: "detail_result.rows"
        item_variable: item_detail
        mode: sequential
        max_iterations: 200

    - id: update_stok_item
      activity_type: Connector
      durability: immediate
      persistence: ssot
      connector_config:
        connector_ref: postgres
        operation: raw_query
        timeout_ms: 3000
        retry_policy:
          max_attempts: 3
          base_delay_ms: 100
          max_delay_ms: 1000
          backoff_factor: 2.0
      input_mappings:
        - target: sql
          source:
            language: literal
            source: "UPDATE produk SET stok = stok - $1 WHERE id = $2"
        - target: params
          source:
            language: v-cel
            source: '[item_detail.jumlah, item_detail.produk_id]'
      output_variable: stok_update_result

    - id: update_status_selesai
      activity_type: Connector
      durability: immediate
      persistence: ssot
      connector_config:
        connector_ref: postgres
        operation: raw_query
        timeout_ms: 3000
        retry_policy:
          max_attempts: 3
          base_delay_ms: 100
          max_delay_ms: 1000
          backoff_factor: 2.0
      input_mappings:
        - target: sql
          source:
            language: literal
            source: >-
              UPDATE pesanan
              SET status = 'selesai', updated_at = now()
              WHERE id = $1
              RETURNING id, status
        - target: params
          source:
            language: v-cel
            source: '[trigger_payload.body.pesanan_id]'
      output_variable: status_update_result

    - id: shape_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: '{"status": status_update_result.rows[0].status, "pesanan_id": trigger_payload.body.pesanan_id}'
      output_variable: final_response

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.final_response" }

    - id: end
      activity_type: End

  flows:
    - { id: f01, from: { node: trigger }, to: { node: select_detail_pesanan } }
    - { id: f02, from: { node: select_detail_pesanan }, to: { node: loop_update_stok } }
    - { id: f03, from: { node: loop_update_stok }, to: { node: update_stok_item } }
    - { id: f04, from: { node: update_stok_item }, to: { node: loop_update_stok } }
    - id: f05
      from: { node: loop_update_stok }
      to: { node: update_status_selesai }
      condition: "_loop_done"
    - { id: f06, from: { node: update_status_selesai }, to: { node: shape_response } }
    - { id: f07, from: { node: shape_response }, to: { node: respond } }
    - { id: f08, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: detail_result, type: object }
    - { name: item_detail, type: object }
    - { name: status_update_result, type: object }
    - { name: stok_update_result, type: object }
    - { name: final_response, type: object }
