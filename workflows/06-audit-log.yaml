version: "3.0"
metadata:
  id: umkm-audit-log
  name: "UMKM - Audit Log"
  description: |
    Workflow 6. Mencatat rekam jejak histori (audit trail) ke tabel audit_log.
    Dipanggil sebagai detached edge (fire-and-forget) dari Workflow 1/3/4/5
    sehingga tidak pernah memblokir respons ke pelanggan/kasir. Stateless,
    fastpath runtime mode.
  dialect: vflow
  tags: [umkm, audit, postgres, fastpath, detached, p1]

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        runtime_mode: fastpath
        webhook_config: { path: /umkm/internal/audit-log, method: POST }
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload

    # Validasi ketat layout parameter sebelum ditulis ke audit_log.
    - id: validate_payload
      activity_type: Validate
      validate_config:
        input: "$.trigger_payload.body"
        schema:
          type: object
          required: [pesanan_id, aktor_id, aktivitas_tipe, payload_log, waktu_kejadian]
          properties:
            pesanan_id: { type: string, min_length: 1 }
            aktor_id: { type: string, min_length: 1 }
            aktivitas_tipe: { type: string, min_length: 1 }
            payload_log: { type: object }
            waktu_kejadian: { type: string, min_length: 1 }
      output_variable: validated_body

    # Pemetaan struktur telemetri sebelum INSERT.
    - id: map_telemetry
      activity_type: Transform
      input_mappings:
        - target: log_entry
          source:
            language: v-cel
            source: >-
              {"pesanan_id": trigger_payload.body.pesanan_id,
               "aktor_id": trigger_payload.body.aktor_id,
               "aktivitas_tipe": trigger_payload.body.aktivitas_tipe,
               "payload_log": trigger_payload.body.payload_log,
               "waktu_kejadian": trigger_payload.body.waktu_kejadian}
      output_variable: log_entry

    - id: insert_audit_log
      activity_type: Connector
      persistence: ssot
      connector_config:
        connector_ref: postgres
        operation: raw_query
        timeout_ms: 3000
        retry_policy:
          max_attempts: 2
          base_delay_ms: 100
          max_delay_ms: 500
          backoff_factor: 2.0
      input_mappings:
        - target: sql
          source:
            language: literal
            source: >-
              INSERT INTO audit_log (pesanan_id, aktor_id, aktivitas_tipe, payload_log, waktu_kejadian)
              VALUES ($1, $2, $3, $4, $5)
              RETURNING id
        - target: params
          source:
            language: v-cel
            source: >-
              [log_entry.pesanan_id, log_entry.aktor_id, log_entry.aktivitas_tipe,
               TO_JSON(log_entry.payload_log), log_entry.waktu_kejadian]
      output_variable: insert_result

    - id: shape_success
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: literal
            source: '{"status": "SUCCESS"}'
      output_variable: final_response

    - id: shape_rejected
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: literal
            source: '{"status": "REJECTED", "code": "INVALID_AUDIT_PAYLOAD"}'
      output_variable: rejected_response

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.final_response" }

    - id: respond-rejected
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.rejected_response" }

    - id: end
      activity_type: End

  flows:
    - { id: f01, from: { node: trigger }, to: { node: validate_payload } }
    - { id: f02, from: { node: validate_payload }, to: { node: map_telemetry } }
    - { id: f03, from: { node: map_telemetry }, to: { node: insert_audit_log } }
    - { id: f04, from: { node: insert_audit_log }, to: { node: shape_success } }
    - { id: f05, from: { node: shape_success }, to: { node: respond } }
    - { id: f06, type: error, from: { node: validate_payload }, to: { node: shape_rejected } }
    - { id: f07, from: { node: shape_rejected }, to: { node: respond-rejected } }
    - { id: f08, from: { node: respond }, to: { node: end } }
    - { id: f09, from: { node: respond-rejected }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: log_entry, type: object }
    - { name: validated_body, type: object }
    - { name: insert_result, type: object }
    - { name: final_response, type: object }
    - { name: rejected_response, type: object }
