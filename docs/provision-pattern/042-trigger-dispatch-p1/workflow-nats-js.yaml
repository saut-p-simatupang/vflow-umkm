version: "3.0"
metadata:
  id: p1-trigger-dispatch-nats-js
  name: "P1 NATS JetStream trigger dispatch"
  description: |
    Runtime contract: JetStream durable consumer receives a broker message and
    dispatches it through the kernel into a normal HTTP connector side effect.

spec:
  activities:
    - id: nats_js_in
      activity_type: Trigger
      trigger_config:
        trigger_type: nats_js
        route: /examples/p1/triggers/nats-js
        nats_js:
          urls: "__NATS_URL__"
          stream: "__NATS_STREAM__"
          durable_name: "__NATS_DURABLE__"
          filter_subject: "__NATS_SUBJECT__"
          ack_policy: explicit
          deliver_policy: new
          max_deliver: 3
      output_variable: trigger_payload

    - id: capture
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        timeout_ms: 3000
      input_mappings:
        - target: url
          source: { language: literal, source: "__CAPTURE_URL__/events/nats-js" }
        - target: body
          source: { language: v-cel, source: "trigger_payload" }
      output_variable: capture_result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: nats_js_in }, to: { node: capture } }
    - { id: f2, from: { node: capture }, to: { node: end } }
