version: "3.0"
metadata:
  id: ai-gw-streaming
  name: "AI Gateway SSE — end-to-end streaming (provision pattern)"
  description: |
    Real-upstream AI gateway benchmark (mirrors the long-running
    `001-basic-ai-gw-demo/ai-gateway.yaml` historic bench workflow, just
    under a distinct webhook path so durability modes can run side by
    side).

    Flow: POST /api/gw/stream → Connector vastar.http streaming →
          upstream LLM at http://127.0.0.1:4545/v1/chat/completions →
          SSE proxy back to client.

    Benchmark harness: `tests/regression/p420-ai-gw-durability-bench.sh`.
    The harness injects `metadata.durability: <mode>` right after
    `metadata.id:` to compare observability / durable / durable_strict
    vs the untouched baseline in this file.

    Upstream simulator: `ai-endpoint-simulator` on :4545
    (`bash ~/Prdmid/vil-project/vil/setup-simulators.sh binary`).

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/gw/stream, method: POST }
        response_framing: chunked
        end_activity: respond
      output_variable: trigger_payload

    - id: call_llm
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        streaming: true
        dialect: openai
        timeout_ms: 30000
      input_mappings:
        - target: url
          source: { language: literal, source: "http://127.0.0.1:4545/v1/chat/completions" }
        - target: body
          source:
            language: literal
            source: '{"model":"gpt-4","messages":[{"role":"user","content":"Benchmark performance test via VFlow P4.20 durability bench"}],"stream":true}'
      output_variable: llm_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: '{"content": llm_result.content}'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger },  to: { node: call_llm } }
    - { id: f2, from: { node: call_llm }, to: { node: respond  } }
    - { id: f3, from: { node: respond },  to: { node: end      } }
