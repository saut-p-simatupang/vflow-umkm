version: "3.0"
metadata:
  id: broker-storage-trigger-s3-event
  name: "S3 event trigger dispatch"
  description: "S3 ObjectCreated notification via SQS dispatches into a runtime-local workflow side effect."
  dialect: vflow
  tags: [example, p0, trigger, s3-event, sqs, blackbox]

spec:
  activities:
    - id: s3_event_in
      activity_type: Trigger
      trigger_config:
        trigger_type: s3_event
        route: /examples/p0/triggers/s3-event
        s3_event:
          bucket: "__S3_BUCKET__"
          prefix: "__S3_PREFIX__"
          queue_url: "__S3_SQS_URL__"
          region: "__S3_REGION__"
          endpoint: "__S3_SQS_ENDPOINT__"
      output_variable: trigger_payload

    - id: capture
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        timeout_ms: 3000
      input_mappings:
        - target: url
          source: { language: literal, source: "__CAPTURE_URL__/events/s3-event" }
        - target: body
          source: { language: v-cel, source: "trigger_payload" }
      output_variable: capture_result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: s3_event_in }, to: { node: capture } }
    - { id: f2, from: { node: capture }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: capture_result, type: object }
