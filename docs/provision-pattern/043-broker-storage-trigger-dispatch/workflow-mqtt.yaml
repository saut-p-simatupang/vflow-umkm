version: "3.0"
metadata:
  id: broker-storage-trigger-mqtt
  name: "MQTT trigger dispatch"
  description: "MQTT publish dispatches into a runtime-local workflow side effect."
  dialect: vflow
  tags: [example, p0, trigger, mqtt, blackbox]

spec:
  activities:
    - id: mqtt_in
      activity_type: Trigger
      trigger_config:
        trigger_type: mqtt
        route: /examples/p0/triggers/mqtt
        mqtt:
          url: "__MQTT_URL__"
          topic: "__MQTT_TOPIC__"
          client_id: "__MQTT_CLIENT_ID__"
      output_variable: trigger_payload

    - id: capture
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        timeout_ms: 3000
      input_mappings:
        - target: url
          source: { language: literal, source: "__CAPTURE_URL__/events/mqtt" }
        - target: body
          source: { language: v-cel, source: "trigger_payload" }
      output_variable: capture_result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: mqtt_in }, to: { node: capture } }
    - { id: f2, from: { node: capture }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: capture_result, type: object }
