version: "3.0"
metadata:
  id: greeting-v1
  name: "Hot-Reload Demo"
  # Deploy: POST /workflow/provision → ms deploy, zero downtime
  # Update: POST /workflow/provision (same id) → instant switch
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/greet, method: POST }
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload
    - id: process
      activity_type: Transform
      input_mappings:
        - target: message
          source: { language: v-cel, source: '"Hello " + trigger_payload.body.name + " from v1"' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: v-cel, source: 'result' }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
