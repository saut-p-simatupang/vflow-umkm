version: "3.0"
metadata:
  id: fastpath-vrule-risk-scoring-grpc
  name: "Fastpath V-Rule Risk Scoring (gRPC)"
  description: |
    Apple-to-apple comparator for `047-fastpath-vrule-risk-scoring`,
    over gRPC instead of HTTP webhook, on the **fastpath runtime**.
    Same V-Rule pack (`fastpath_risk_v1`), same six input fields,
    equivalent decision shape — isolates pure protocol overhead
    (gRPC vs HTTP) on the fastpath kernel-state-machine-bypassed
    path.

    Activities (4): Trigger(grpc) → VRule → EndTrigger → End. Same
    structure as 047 webhook fastpath modulo:
      - `trigger_type: grpc` (+ service/method/body_schema)
      - input_mappings `language: v-cel` over `trigger_body.X`
        (mirroring 047's spv1 over `$.trigger_payload.body.X`)
      - EndTrigger `language: bytes_ref` (mirroring 047's spv1 +
        encoding base64 — but byte-native via proto-output sidechannel)

    Phase 4 of the gRPC-native devplan (2026-05-03) lifted the
    fastpath plan-builder's webhook-only restriction; this example
    is the canonical demonstration. Body bytes flow as a typed
    `ProtoHandle` directly into the fastpath inline executor — no
    kernel state-machine overhead. V-Rule fastpath dispatch detects
    the proto handle and takes the proto-native input + output path
    inherited from Phases 2 and 3 of the devplan. The same compiled
    V-Rule pack (`fastpath_risk_v1`) drives both 047 (JSON in/out)
    and 061 (proto in/out).

    For the standard-runtime variant (apple-to-apple with 049
    webhook standard) see `060-standard-vrule-risk-scoring-grpc`.

  dialect: vflow
  tags: [example, p0, grpc, vrule, risk-scoring, bench, fastpath]

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: grpc
        runtime_mode: fastpath
        grpc:
          service: "examples.RiskScoring"
          method: "ScoreRisk"
          body_schema: "examples.RiskRequest"
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload

    - id: score_risk
      activity_type: VRule
      rule_config:
        tenant_id: examples
        rule_set_id: fastpath_risk_v1
        version_policy: latest
      # Input mappings stay in the YAML for documentation + JSON-path
      # fallback. On fastpath gRPC the proto-field tier serves these
      # without entering the v-cel VM, AND V-Rule's proto-native
      # input dispatch consumes the cached `DynamicMessage` directly
      # from the `ProtoHandle` (skipping the JSON intermediate
      # entirely).
      input_mappings:
        - target: amount
          source: { language: v-cel, source: 'trigger_body.amount' }
        - target: country
          source: { language: v-cel, source: 'trigger_body.country' }
        - target: card_bin
          source: { language: v-cel, source: 'trigger_body.card_bin' }
        - target: merchant_category
          source: { language: v-cel, source: 'trigger_body.merchant_category' }
        - target: customer_tier
          source: { language: v-cel, source: 'trigger_body.customer_tier' }
        - target: velocity_1h
          source: { language: v-cel, source: 'trigger_body.velocity_1h' }
      output_variable: risk_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        # `bytes_ref` reads raw bytes from `risk_result`'s handle slot.
        # V-Rule writes encoded `examples.RiskResponse` bytes there
        # because the pack declares `output_proto_schema:
        # examples.RiskResponse` (Phase 3). No Transform encode_response
        # activity needed.
        final_response:
          language: bytes_ref
          source: "risk_result"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger },    to: { node: score_risk } }
    - { id: f2, from: { node: score_risk }, to: { node: respond } }
    - { id: f3, from: { node: respond },    to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: risk_result,     type: object }
