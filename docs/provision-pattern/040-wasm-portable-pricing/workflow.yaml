version: "3.0"
metadata:
  id: wasm-portable-pricing
  name: "WASM Portable Pricing"
  description: |
    Runtime-local executable WASM example. The pricing module is compiled to
    wasm32-wasip1 and loaded from VFLOW_WASM_DIR by the runtime.
  dialect: vflow
  tags: [example, p0, wasm, artifact, pricing, blackbox]

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        route: /examples/wasm-pricing
        webhook_config: { path: /examples/wasm-pricing, method: POST }
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload

    - id: price_with_wasm
      activity_type: Function
      persistence: ssot
      wasm_config:
        module_ref: portable_pricing
        function_name: execute
        pool_size: 1
        timeout_ms: 5000
      input_mappings:
        - target: base_price_cents
          source: { language: v-cel, source: "trigger_payload.body.base_price_cents" }
        - target: discount_bps
          source: { language: v-cel, source: "trigger_payload.body.discount_bps" }
      output_variable: pricing_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.pricing_result" }

    - id: end
      activity_type: End

  flows:
    - { id: f01, from: { node: trigger }, to: { node: price_with_wasm } }
    - { id: f02, from: { node: price_with_wasm }, to: { node: respond } }
    - { id: f03, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: pricing_result, type: object }
